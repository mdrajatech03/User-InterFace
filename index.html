<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="google-site-verification" content="YYhZTlRtSMjvclj5Co6Wiypw8xkZAxWc8Pjlc0bnSQE" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User-InterFace</title>
    <link rel="stylesheet" href="style.css">
</head> 

<body>
    <!-- header----------------------------------------->
    <header>
        <h2 class="logo" style="background-color: rgb(37, 67, 68);">Te<span>ch</span></h2>
        <nav class="navigation">
            <a href="index.html">HOME</a>
            <a href="general.html">ABOUT</a>
            <a href="general.html">SERVICES</a>
            <a href="general.html">CONTACT</a>
            <button class="btnLogin-popup">Login</button>
        </nav>
    </header>

    <!-- wrapper------------------------------------------>

    <div class="wrapper">
        <span class="icon-close"><ion-icon name="close"></ion-icon></span>
        
        <div class="form-box login">
            <h2>Login</h2>
            <form action="wlcmpage.html">
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" required>
                    <label>Email</label>
                </div>

                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" required>
                    <label>Password</label>
                </div>
                
                <div class="remember-forgot">
                    <label><input type="checkbox">
                        Remember me 
                    </label>
                    <a href="#">Forgot Password</a>
                </div>

                <button type="submit" class="btn">Login</button>

                <div class="login-register">
                    <p>Don't have an Account? <a href="#" class="register-link">Register</a></p>
                </div>
            </form>
        </div>

        <div class="form-box register">
            <h2>Registration</h2>
            <form action="profile.html">

                <div class="input-box">
                    <span class="icon"><ion-icon name="person"></ion-icon></span>
                    <input type="text" required>
                    <label>Username</label>
                </div>

                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" required>
                    <label>Email</label>
                </div>

                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" required>
                    <label>Password</label>
                </div>
                
                <div class="remember-forgot">
                    <label><input type="checkbox">
                        agree to the terms & conditions
                    </label>
                </div>

                <button type="submit" class="btn">Register</button>

                <div class="login-register">
                    <p>Already have an Account? <a href="#" class="login-link">Login</a></p>
                </div>
            </form>
        </div>

    </div>

    <script src="script.js"></script>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

</body>

</html>

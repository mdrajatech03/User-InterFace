<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RajaTech | Professional Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary: #00f2fe;
            --accent: #4facfe;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar Layout */
        .header {
            width: 100%;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            position: fixed;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo { font-size: 1.6rem; font-weight: 700; color: var(--primary); letter-spacing: 1px; }

        #btnLogout {
            padding: 8px 22px;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        #btnLogout:hover { background: var(--primary); color: #000; }

        /* Main Profile Section */
        .main-content {
            flex: 1;
            margin-top: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .profile-card {
            background: var(--glass);
            padding: 40px 30px;
            border-radius: 28px;
            text-align: center;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Image Fix: Hamesha Circle rahega */
        .avatar-wrapper {
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            overflow: hidden; /* Bahar ki image cut jayegi */
            background: #1e293b;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        #userDP {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Image ko stretch nahi hone dega */
            display: block;
        }

        #welcomeMessage { font-size: 1.8rem; font-weight: 600; margin-bottom: 5px; }
        #userEmailDisplay { color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px; }

        .update-box { display: flex; flex-direction: column; gap: 12px; }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(15, 23, 42, 0.5);
            color: #fff;
            outline: none;
        }

        #btnUpdatePhoto {
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, var(--accent), var(--primary));
            color: #000;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Responsive Mobile */
        @media (max-width: 480px) {
            .header { padding: 10px 5%; }
            .logo { font-size: 1.3rem; }
            .profile-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">RAJATECH</div>
        <button id="btnLogout">Logout</button>
    </header>

    <div class="main-content">
        <div class="profile-card">
            <div class="avatar-wrapper">
                <img id="userDP" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile">
            </div>
            
            <h1 id="welcomeMessage">Loading...</h1>
            <p id="userEmailDisplay">Checking session...</p>

            <div class="update-box">
                <input type="text" id="photoURLInput" placeholder="Paste Image Link (JPG/PNG)">
                <button id="btnUpdatePhoto">Update Profile Picture</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raja Tech - Portfolio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        body { background-color: #161922; font-family: 'Poppins', sans-serif; color: white; text-align: center; }
        .header { display: flex; justify-content: space-around; align-items: center; background: #000; padding: 15px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .profile-card { margin-top: 120px; background: #1f232d; padding: 30px; border-radius: 15px; display: inline-block; border: 1px solid #00f2fe; }
        #userDP { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #00f2fe; object-fit: cover; margin-bottom: 15px; }
        .input-group { margin-top: 20px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 250px; }
    </style>
</head>
<body>

    <header class="header">
        <h2>RAJATECH</h2>
        <button id="btnLogout" class="btn">Logout</button>
    </header>

    <div class="profile-card">
        <img id="userDP" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile">
        <h1 id="welcomeMessage">Loading...</h1>
        <p id="userEmailDisplay">---</p>

        <div class="input-group">
            <input type="text" id="photoURLInput" placeholder="Paste Image URL here">
            <button id="btnUpdatePhoto" class="btn" style="padding: 10px;">Update Photo</button>
        </div>
    </div>

    <div style="margin-top: 50px;">
        <h3>Project Status: Back-End Integrated!</h3>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
